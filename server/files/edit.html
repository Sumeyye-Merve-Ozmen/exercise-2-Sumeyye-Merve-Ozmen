<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Edit Movie</title>
  <link rel="stylesheet" href="base.css">
  <link rel="stylesheet" href="edit.css">
</head>
<body>

<h1>Edit Movie</h1>

<form>

  <input type="hidden" id="imdbID">

  <div>
    <label for="Title">Title</label>
    <input id="Title" required>
  </div>

  <div>
    <label for="Released">Released</label>
    <input id="Released" type="date" required>
  </div>

  <div>
    <label for="Runtime">Runtime</label>
    <input id="Runtime" type="number" required>
  </div>

  <div>
    <label for="Genres">Genres</label>
    <select id="Genres" multiple required>
      <option>Action</option>
      <option>Adventure</option>
      <option>Comedy</option>
      <option>Drama</option>
      <option>Horror</option>
      <option>Sci-Fi</option>
    </select>
  </div>

  <div>
    <label for="Directors">Directors</label>
    <input id="Directors">
  </div>

  <div>
    <label for="Writers">Writers</label>
    <input id="Writers">
  </div>

  <div>
    <label for="Actors">Actors</label>
    <input id="Actors">
  </div>

  <div>
    <label for="Plot">Plot</label>
    <textarea id="Plot"></textarea>
  </div>

  <div>
    <label for="Poster">Poster</label>
    <input id="Poster">
  </div>

  <div>
    <label for="Metascore">Metascore</label>
    <input id="Metascore" type="number">
  </div>

  <div>
    <label for="imdbRating">Rating</label>
    <input id="imdbRating" type="number" step="0.1">
  </div>

  <button type="button" onclick="putMovie()">Save</button>
  <button type="button" onclick="location.href='index.html'">Cancel</button>

</form>

<script src="edit.js"></script>

</body>
</html>
